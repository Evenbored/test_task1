version: '3.9'

services:
  web:
    build: .
    container_name: django_test_task
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      - DJANGO_DEBUG_MODE=true
      - REDIS_HOST=redis
    env_file:
      - .env
    volumes:
      - ./organization_structure_api:/app/organization_structure_api
      - static_volume:/app/organization_structure_api/staticfiles
    expose:
      - "8000"
    depends_on:
      - db
      - redis
  db:
    image: postgres
    container_name: postgres_test_task_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
  redis:
    image: redis:alpine
    container_name: redis_test_task
    ports:
      - "6379:6379"
  nginx:
    image: nginx:alpine
    container_name: nginx_test_task_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/organization_structure_api/staticfiles:ro
  
volumes:
  postgres_data:
  static_volume: